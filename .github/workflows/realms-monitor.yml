name: Realms Login Monitor

on:
  schedule:
    - cron: '2,17,32,47 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Restore auth-cache from secret
        env:
          AUTH_CACHE_BUNDLE: ${{ secrets.PRISMARINE_AUTH_CACHE_BUNDLE }}
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const path = require('path')

          const bundle = process.env.AUTH_CACHE_BUNDLE
          if (!bundle) {
            console.log('No auth-cache bundle secret found.')
            process.exit(0)
          }

          const decoded = JSON.parse(Buffer.from(bundle, 'base64').toString('utf8'))
          const files = decoded.files || {}

          fs.mkdirSync('auth-cache', { recursive: true })

          for (const [name, b64] of Object.entries(files)) {
            const filePath = path.join('auth-cache', name)
            fs.writeFileSync(filePath, Buffer.from(b64, 'base64'))
          }

          console.log(`Restored ${Object.keys(files).length} auth-cache files.`)
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Ensure state.json exists
        run: |
          node -e "const fs=require('fs'); const p='state.json'; if (!fs.existsSync(p)) { fs.writeFileSync(p, JSON.stringify({ previousCount: 0, authPaused: false, authFailedAt: null, authRecoveredAt: null, updatedAt: null }, null, 2) + '\n'); console.log('Created state.json'); } else { console.log('state.json already exists'); }"

      - name: Run monitor
        env:
          REALM_ID: ${{ secrets.REALM_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ADMIN_WEBHOOK_URL: ${{ secrets.DISCORD_ADMIN_WEBHOOK_URL }}
          PRISMARINE_AUTH_CACHE_BUNDLE: ${{ secrets.PRISMARINE_AUTH_CACHE_BUNDLE }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_SECRETS_WRITE_TOKEN: ${{ secrets.GH_SECRETS_WRITE_TOKEN }}
          GH_AUTH_CACHE_SECRET_NAME: ${{ secrets.GH_AUTH_CACHE_SECRET_NAME }}
          MONITOR_TIMEOUT_MS: 15000
          RECOVERY_TIMEOUT_MS: 300000
        run: node index.js

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "No state.json changes to commit."
          else
            git commit -m "Update state.json"
            git push
          fi